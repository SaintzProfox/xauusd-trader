# ═══════════════════════════════════════════════════════════════
# FILE 1: /etc/systemd/system/xauusd-generator.service
# Signal generator service
# ═══════════════════════════════════════════════════════════════
[Unit]
Description=XAUUSD Signal Generator
After=network-online.target
Wants=network-online.target
StartLimitIntervalSec=60
StartLimitBurst=5

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu/xauusd-trader
EnvironmentFile=/home/ubuntu/xauusd-trader/.env
ExecStart=/home/ubuntu/xauusd-trader/venv/bin/python -m signals.generator
Restart=on-failure
RestartSec=15
StandardOutput=journal
StandardError=journal
SyslogIdentifier=xauusd-generator

[Install]
WantedBy=multi-user.target


# ═══════════════════════════════════════════════════════════════
# FILE 2: /etc/systemd/system/xauusd-dashboard.service
# Web dashboard service
# ═══════════════════════════════════════════════════════════════
[Unit]
Description=XAUUSD Web Dashboard
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu/xauusd-trader
EnvironmentFile=/home/ubuntu/xauusd-trader/.env
ExecStart=/home/ubuntu/xauusd-trader/venv/bin/python dashboard.py
Restart=on-failure
RestartSec=10
StandardOutput=journal
StandardError=journal
SyslogIdentifier=xauusd-dashboard

[Install]
WantedBy=multi-user.target
